<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İtiraz Takip</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-5xl mx-auto">

    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">İtiraz Takip</h1>
    </div>

    <!-- 🔍 ARAMA -->
    <div class="bg-white p-4 rounded-2xl shadow mb-4">
      <input id="search" oninput="render()" placeholder="Ara... (F3)" class="border p-2 w-full rounded" />
    </div>

    <!-- 💾 YEDEK BUTONLARI -->
    <div class="bg-white p-4 rounded-2xl shadow mb-4 flex gap-2">
      <button onclick="exportData()" class="bg-purple-500 text-white px-4 py-2 rounded">Yedek İndir</button>
      <input type="file" id="importFile" class="hidden" onchange="importData(event)" />
      <button onclick="document.getElementById('importFile').click()" class="bg-orange-500 text-white px-4 py-2 rounded">Yedek Yükle</button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow mb-6">
      <input id="name" placeholder="Hesap Adı" class="border p-2 mr-2 rounded" />
      <input id="reason" placeholder="İtiraz Nedeni" class="border p-2 mr-2 rounded" />
      <button onclick="addRow()" class="bg-blue-500 text-white px-4 py-2 rounded">Ekle</button>
    </div>

    <table class="w-full bg-white rounded-2xl shadow">
      <thead>
        <tr class="bg-gray-200">
          <th class="p-2">Hesap</th>
          <th class="p-2">Neden</th>
          <th class="p-2">İtiraz</th>
          <th class="p-2">Durum</th>
          <th class="p-2">Aksiyon</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </div>

<script>
let data = JSON.parse(localStorage.getItem('itirazData')) || [];

function saveData() {
  localStorage.setItem('itirazData', JSON.stringify(data));
}

function addRow() {
  const name = document.getElementById('name').value;
  const reason = document.getElementById('reason').value;

  if (!name) return alert('Hesap adı gir');

  data.push({ name, reason, count: 0, resetTime: null });
  saveData();
  render();
}

function sendAppeal(index) {
  const item = filteredData()[index];
  if (item.count >= 3) return;

  item.count++;
  if (item.count === 3) {
    item.resetTime = Date.now() + 7*24*60*60*1000;
  }

  saveData();
  render();
}

function deleteRow(index) {
  const item = filteredData()[index];
  data = data.filter(d => d !== item);
  saveData();
  render();
}

function getRemaining(time) {
  const diff = time - Date.now();
  if (diff <= 0) return 'Hazır';
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  return `${days}g ${hours}s`;
}

function filteredData() {
  const q = document.getElementById('search').value.toLowerCase();
  return data.filter(x => x.name.toLowerCase().includes(q) || x.reason.toLowerCase().includes(q));
}

function highlight(text, q) {
  if (!q) return text;
  const r = new RegExp(`(${q})`, 'gi');
  return text.replace(r, '<mark class="bg-yellow-300">$1</mark>');
}

function render() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  const q = document.getElementById('search').value;
  const list = filteredData();

  list.forEach((item,i)=>{
    let status='Kullanılabilir';
    if(item.count>=3){
      status=getRemaining(item.resetTime);
      if(status==='Hazır'){
        item.count=0;
        item.resetTime=null;
        saveData();
      }
    }

    tbody.innerHTML += `
    <tr class="border-t">
      <td class="p-2">${highlight(item.name,q)}</td>
      <td class="p-2">${highlight(item.reason,q)}</td>
      <td class="p-2">${item.count}/3</td>
      <td class="p-2">${status}</td>
      <td class="p-2">
        <button onclick="sendAppeal(${i})" class="bg-green-500 text-white px-2 py-1 rounded">Gönder</button>
        <button onclick="deleteRow(${i})" class="bg-red-500 text-white px-2 py-1 rounded">Sil</button>
      </td>
    </tr>`;
  });
}

// 💾 YEDEK AL
function exportData(){
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "itiraz_yedek.json";
  a.click();
}

// 📂 YEDEK YÜKLE
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    data = JSON.parse(evt.target.result);
    saveData();
    render();
  };
  reader.readAsText(file);
}

// F3 focus
window.addEventListener('keydown', e=>{
  if(e.key==='F3'){
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

render();
setInterval(render,60000);
</script>

</body>
</html>
