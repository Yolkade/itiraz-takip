  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
    
    body { font-family: 'Poppins', sans-serif; background: #03060e; color: #e5e7eb; overflow-x: hidden; }
    .glass { background: rgba(10, 15, 28, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.1); }
    
    .astaroth-logo {
        font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 800;
        letter-spacing: 6px; text-transform: uppercase;
        background: linear-gradient(180deg, #fff, #3b82f6);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
    }

    .mono-timer { font-family: 'JetBrains Mono', monospace; }

    .folder-icon { cursor:pointer; font-size:24px; color:#3b82f6; transition:0.3s; }
    .folder-icon:hover { color:#60a5fa; }

    /* modal styles */
    .modal { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; }
    .modal-content { background:#111827; padding:20px; border-radius:1rem; max-width:400px; width:90%; }
    .modal-content input { width:100%; padding:10px; margin-bottom:10px; border-radius:0.5rem; border:none; outline:none; }

    @keyframes pulse-ready-alert {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.1); }
      50% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); background: rgba(16, 185, 129, 0.4); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.1); }
    }
    .ready-alert { animation: pulse-ready-alert 1.5s infinite; border: 1px solid #10b981 !important; color: #10b981 !important; font-weight: 900 !important; }

    .stats-overlay { position: fixed; bottom: 25px; left: 25px; z-index: 100; padding: 15px 20px; border-radius: 20px; background: #080c18; border: 1px solid rgba(59, 130, 246, 0.15); }

    .progress-container { width: 100px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
    .progress-bar { height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s ease-in-out; }

  </style>
</head>
<body>

  <!-- Header -->
  <div class="flex justify-between items-center p-5 glass">
    <div class="astaroth-logo">ASTAROTH</div>
    <div class="flex items-center space-x-4">
      <span class="folder-icon" onclick="openFolderModal()">📁</span>
    </div>
  </div>

  <!-- Modal for folder creation -->
  <div id="folderModal" class="modal flex">
    <div class="modal-content">
      <h3>Klasör İsmi Giriniz</h3>
      <input type="text" id="folderName" placeholder="Klasör adı...">
      <button onclick="createFolder()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500">Oluştur</button>
      <button onclick="closeFolderModal()" class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600 ml-2">İptal</button>
    </div>
  </div>

  <!-- Klasörler Listesi -->
  <div id="foldersContainer" class="p-5 grid grid-cols-3 gap-4"></div>

  <script>
    const foldersContainer = document.getElementById('foldersContainer');
    const folderModal = document.getElementById('folderModal');
    const folderNameInput = document.getElementById('folderName');

    // Modal açma
    function openFolderModal() {
      folderNameInput.value = '';
      folderModal.style.display = 'flex';
      folderNameInput.focus();
    }

    // Modal kapama
    function closeFolderModal() {
      folderModal.style.display = 'none';
    }

    // Klasör oluşturma
    function createFolder() {
      const name = folderNameInput.value.trim();
      if (!name) {
        alert('Lütfen bir isim girin!');
        return;
      }

      const folderDiv = document.createElement('div');
      folderDiv.className = 'glass p-4 rounded shadow-md cursor-pointer flex flex-col items-center hover:bg-blue-900 transition';
      folderDiv.innerHTML = `
        <span style="font-size:40px;">📁</span>
        <span class="mt-2">${name}</span>
        <button onclick="deleteFolder(event)" class="mt-2 bg-red-600 text-white px-2 py-1 rounded text-sm hover:bg-red-500">Sil</button>
      `;

      foldersContainer.appendChild(folderDiv);
      closeFolderModal();
    }

    // Klasör silme
    function deleteFolder(event) {
      event.stopPropagation();
      const folder = event.currentTarget.parentElement;
      if (confirm('Bu klasörü silmek istediğinize emin misiniz?')) {
        folder.remove();
      }
    }

    // Modal dışına tıklayınca kapatma
    window.onclick = function(event) {
      if (event.target == folderModal) {
        closeFolderModal();
      }
    }
  </script>

</body>
