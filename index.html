<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Astaroth - Shadow Protocol v5.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
    
    body { font-family: 'Poppins', sans-serif; background: #02040a; color: #e5e7eb; margin: 0; overflow-x: hidden; }
    .glass { background: rgba(8, 12, 24, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); }
    
    /* LOGO: DAHA SERT VE SİBER */
    .astaroth-logo {
        font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900;
        letter-spacing: 12px; text-transform: uppercase;
        background: linear-gradient(to bottom, #fff 20%, #3b82f6 50%, #000 95%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.4));
        position: relative;
    }

    .mono-timer { font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: -1px; }

    @keyframes pulse-ready {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.2); }
      70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); border-color: rgba(16, 185, 129, 0.8); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); border-color: rgba(16, 185, 129, 0.2); }
    }
    .ready-glow { animation: pulse-ready 2s infinite; background: rgba(16, 185, 129, 0.1) !important; color: #10b981 !important; }

    .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #f97316, #ea580c); transition: width 1s linear; }

    .stats-panel { position: fixed; bottom: 30px; left: 30px; padding: 20px 30px; border-radius: 30px; background: #080c18; border: 1px solid rgba(59, 130, 246, 0.15); z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    .copy-toast { position: fixed; top: 25px; right: 25px; background: #3b82f6; color: white; padding: 15px 30px; border-radius: 20px; transform: translateY(-130px); transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
    
    .filter-btn { transition: all 0.5s; border: 1px solid rgba(255,255,255,0.03); color: #4b5563; font-weight: 800; }
    .filter-btn.active { background: #2563eb; border-color: #3b82f6; color: white; box-shadow: 0 0 25px rgba(37, 99, 235, 0.4); }
  </style>
</head>
<body class="p-4 md:p-8 text-sm">

  <div id="copyToast" class="copy-toast">İŞLEM BAŞARILI ⚡</div>

  <div class="stats-panel glass space-y-4">
    <div class="flex items-center gap-5"><div class="w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_15px_#3b82f6]"></div><span id="totalCount" class="mono-timer text-xl">0</span></div>
    <div class="flex items-center gap-5"><div class="w-3 h-3 rounded-full bg-orange-500 shadow-[0_0_15px_#f97316]"></div><span id="waitingCount" class="mono-timer text-orange-500 text-xl">0</span></div>
    <div class="flex items-center gap-5"><div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981]"></div><span id="readyCount" class="mono-timer text-emerald-500 text-xl">0</span></div>
  </div>

  <div class="max-w-7xl mx-auto pb-40">
    <header class="flex flex-col md:flex-row justify-between items-center mb-20 gap-10">
      <div id="logo" class="astaroth-logo">ASTAROTH</div>
      <div id="liveClock" class="text-4xl font-bold mono-timer bg-blue-950/10 px-12 py-5 rounded-[2.5rem] border border-blue-500/10 text-blue-500 shadow-inner">00:00:00</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      <div class="lg:col-span-4 space-y-10">
        <div class="glass p-12 rounded-[3.5rem]">
            <h2 class="text-[12px] font-black mb-10 text-blue-500 uppercase tracking-[0.5em]">PROTOKOL GİRİŞİ</h2>
            <div class="space-y-6">
              <input id="name" placeholder="Hesap Tanımlayıcı" class="w-full p-6 rounded-2xl bg-black border border-white/5 outline-none focus:border-blue-500/50 transition-all text-xl" />
              <select id="reasonSelect" class="w-full p-6 rounded-2xl bg-black border border-white/5 outline-none cursor-pointer"></select>
              <button onclick="addRow()" class="w-full bg-blue-700 hover:bg-blue-600 py-6 rounded-2xl font-black transition-all uppercase tracking-widest text-xl shadow-[0_15px_30px_rgba(29,78,216,0.2)] active:scale-95">SİSTEME KAYDET</button>
            </div>
        </div>

        <div class="glass p-12 rounded-[3.5rem]">
          <h2 class="text-[12px] font-black mb-10 text-emerald-500 uppercase tracking-[0.5em] text-center">NOT KÜTÜPHANESİ</h2>
          <div class="flex gap-4 mb-8">
            <input id="newTemplate" placeholder="Yeni metin..." class="flex-1 p-5 rounded-xl bg-black border border-white/5 text-sm outline-none" />
            <button onclick="addTemplate()" class="bg-emerald-700 px-7 rounded-xl font-bold hover:bg-emerald-600 transition-all">+</button>
          </div>
          <div id="templateList" class="max-h-80 overflow-y-auto space-y-5 pr-4 custom-scrollbar"></div>
        </div>
      </div>

      <div class="lg:col-span-8">
        <div class="glass rounded-[4rem] overflow-hidden shadow-[0_30px_80px_rgba(0,0,0,0.7)]">
          <div class="p-10 bg-black/40 border-b border-white/5 space-y-8">
            <div class="flex flex-wrap gap-5">
                <button id="filterAll" onclick="setFilter('all')" class="filter-btn active text-[12px] px-10 py-4 rounded-2xl bg-gray-900/50 uppercase tracking-widest">TÜMÜ</button>
                <button id="filterReady" onclick="setFilter('ready')" class="filter-btn text-[12px] px-10 py-4 rounded-2xl bg-gray-900/50 uppercase tracking-widest text-emerald-500">MÜSAİTLER</button>
                <button id="filterWaiting" onclick="setFilter('waiting')" class="filter-btn text-[12px] px-10 py-4 rounded-2xl bg-gray-900/50 text-orange-500 uppercase tracking-widest">SÜREDEKİLER</button>
            </div>
            
            <div class="flex items-center justify-between gap-10">
                <input id="search" oninput="render()" placeholder="Veri tabanında ara..." class="bg-transparent outline-none flex-1 text-2xl border-b border-white/10 pb-3 focus:border-blue-500/60 transition-all" />
                <div class="flex gap-5">
                    <button onclick="exportData()" class="text-[11px] font-black bg-gray-800 hover:bg-gray-700 px-8 py-4 rounded-xl">YEDEK</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)" accept=".json" />
                    <button onclick="document.getElementById('importFile').click()" class="text-[11px] font-black bg-blue-900/20 text-blue-400 px-8 py-4 rounded-xl border border-blue-500/20">YÜKLE</button>
                </div>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="text-[11px] uppercase text-gray-600 bg-black/50">
                <tr>
                  <th class="p-12">HESAP DETAYI</th>
                  <th class="p-12 text-center">İTİRAZ</th>
                  <th class="p-12 text-center">GERİ SAYIM</th>
                  <th class="p-12 text-right">İŞLEM</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="editModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/98 backdrop-blur-3xl">
    <div class="bg-[#02040a] border border-blue-500/10 w-full max-w-2xl rounded-[5rem] p-20 space-y-12 shadow-2xl">
        <div class="flex justify-between items-center"><h3 class="text-4xl font-black text-blue-600 tracking-tighter">VERİ MANİPÜLASYON</h3><button onclick="closeEdit()" class="text-6xl text-gray-800 hover:text-white transition-all">&times;</button></div>
        <div class="space-y-10">
            <div><label class="text-[12px] ml-4 text-gray-600 uppercase tracking-[0.3em]">HESAP ADI</label><input id="editName" class="w-full p-7 rounded-2xl bg-black border border-white/5 outline-none focus:border-blue-500/50 text-2xl" /></div>
            <div class="grid grid-cols-2 gap-10">
                <div><label class="text-[12px] ml-4 text-gray-600 uppercase tracking-[0.3em]">İTİRAZ SAYISI</label><input id="editCount" type="number" min="0" max="3" class="w-full p-7 rounded-2xl bg-black border border-white/5 outline-none text-2xl text-center" /></div>
                <div><label class="text-[12px] ml-4 text-gray-600 uppercase tracking-[0.3em]">SÜRE (+/- DAKİKA)</label><input id="editMinutes" type="number" class="w-full p-7 rounded-2xl bg-black border border-white/5 outline-none text-2xl text-center" placeholder="0" /></div>
            </div>
            <div><label class="text-[12px] ml-4 text-gray-600 uppercase tracking-[0.3em]">BAŞLANGIÇ NOKTASI</label><input id="editTime" type="datetime-local" class="w-full p-7 rounded-2xl bg-black border border-white/5 outline-none text-xl" /></div>
        </div>
        <div class="flex gap-8 pt-8">
            <button onclick="closeEdit()" class="flex-1 py-7 rounded-[2rem] bg-gray-950 font-black uppercase tracking-widest text-[13px] hover:bg-gray-900 transition-all">İPTAL</button>
            <button onclick="saveEdit()" class="flex-1 py-7 rounded-[2rem] bg-blue-800 font-black shadow-2xl uppercase tracking-widest text-[13px] hover:bg-blue-700 transition-all">SİSTEMİ GÜNCELLE</button>
        </div>
    </div>
  </div>

<script>
let data = JSON.parse(localStorage.getItem('astaroth_v5_db')) || [];
let templates = JSON.parse(localStorage.getItem('astaroth_v5_tpl')) || ["Ödenmemiş Bakiye", "Sistem İhlali"];
let currentFilter = 'all';
let editingIndex = null;

const save = () => {
    localStorage.setItem('astaroth_v5_db', JSON.stringify(data));
    localStorage.setItem('astaroth_v5_tpl', JSON.stringify(templates));
    updateStats();
};

function showToast(msg) {
    const t = document.getElementById('copyToast');
    t.innerText = msg; t.style.transform = 'translateY(0)';
    setTimeout(() => t.style.transform = 'translateY(-130px)', 3000);
}

function updateStats() {
    const total = data.length;
    const waiting = data.filter(x => x.count === 3 && (x.resetTime - Date.now() > 0)).length;
    const ready = total - waiting;
    document.getElementById('totalCount').innerText = total;
    document.getElementById('waitingCount').innerText = waiting;
    document.getElementById('readyCount').innerText = ready;
}

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
    render();
}

function renderTemplates() {
    const list = document.getElementById('templateList');
    const select = document.getElementById('reasonSelect');
    list.innerHTML = ''; select.innerHTML = '';
    templates.forEach((t, i) => {
        list.innerHTML += `<div class="flex items-center gap-5 bg-white/[0.02] p-6 rounded-2xl border border-white/5 group hover:border-emerald-500/50 transition-all"><span class="flex-1 text-sm font-bold truncate">${t}</span><button onclick="navigator.clipboard.writeText('${t}').then(()=>showToast('TASLAK KOPYALANDI 📋'))" class="text-emerald-500 opacity-20 group-hover:opacity-100 transition-all text-2xl">📋</button><button onclick="deleteTemplate(${i})" class="text-red-950 hover:text-red-600 transition-all px-3">✕</button></div>`;
        select.innerHTML += `<option value="${t}">${t}</option>`;
    });
}

function addTemplate() {
    const v = document.getElementById('newTemplate').value.trim();
    if(v) { templates.push(v); document.getElementById('newTemplate').value = ''; save(); renderTemplates(); }
}

function deleteTemplate(i) { templates.splice(i, 1); save(); renderTemplates(); }

function addRow() {
    const n = document.getElementById('name').value.trim();
    if(!n) return;
    data.push({ name: n, reason: document.getElementById('reasonSelect').value, count: 0, resetTime: null, id: Date.now(), wasWaiting: false });
    document.getElementById('name').value = ''; save(); render();
}

// KRİTİK FİX: BUTON ARTIK ID ÜZERİNDEN ÇALIŞIYOR
function sendAppeal(id) {
    const item = data.find(x => x.id === id);
    if(item && item.count < 3) {
        const template = templates.find(t => t.includes(item.reason)) || item.reason;
        navigator.clipboard.writeText(template).then(() => showToast("İTİRAZ METNİ HAZIR ⚡"));
        item.count++;
        item.wasWaiting = false;
        if(item.count === 3) item.resetTime = Date.now() + 604800000;
        save(); render();
    }
}

function openEdit(id) {
    const item = data.find(x => x.id === id);
    editingIndex = data.findIndex(x => x.id === id);
    document.getElementById('editName').value = item.name;
    document.getElementById('editCount').value = item.count;
    document.getElementById('editMinutes').value = 0;
    let base = item.resetTime ? new Date(item.resetTime - 604800000) : new Date();
    const tz = base.getTimezoneOffset() * 60000;
    document.getElementById('editTime').value = new Date(base - tz).toISOString().slice(0, 16);
    document.getElementById('editModal').classList.remove('hidden');
}

function saveEdit() {
    const item = data[editingIndex];
    item.name = document.getElementById('editName').value;
    item.count = parseInt(document.getElementById('editCount').value);
    const mins = parseInt(document.getElementById('editMinutes').value);
    const tVal = new Date(document.getElementById('editTime').value).getTime();
    if(item.count === 3) {
        let currentReset = item.resetTime || (Date.now() + 604800000);
        let currentBase = currentReset - 604800000;
        if(Math.abs(tVal - currentBase) > 60000) { item.resetTime = tVal + 604800000; } 
        else if(mins !== 0) { item.resetTime = currentReset + (mins * 60000); }
    } else { item.resetTime = null; item.wasWaiting = false; }
    save(); render(); closeEdit();
}

function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

function deleteRow(id) {
    if(confirm('Veri geri dönülemez şekilde silinsin mi?')) { data = data.filter(x => x.id !== id); save(); render(); }
}

function getProcessedData() {
    let list = [...data];
    const q = document.getElementById('search').value.toLowerCase();
    if(q) list = list.filter(x => x.name.toLowerCase().includes(q));
    if(currentFilter === 'ready') list = list.filter(x => x.count < 3 || (x.resetTime && x.resetTime - Date.now() <= 0));
    else if(currentFilter === 'waiting') list = list.filter(x => x.count === 3 && (x.resetTime - Date.now() > 0));
    return list;
}

function render() {
    const tbody = document.getElementById('tableBody');
    const list = getProcessedData();
    tbody.innerHTML = '';
    
    list.forEach((item) => {
        let isWaiting = item.count === 3;
        let diff = isWaiting ? item.resetTime - Date.now() : 0;
        
        if(isWaiting && diff <= 0) { 
            item.count = 0; item.resetTime = null; item.wasWaiting = true;
            isWaiting = false; save(); 
        }

        let readyClass = item.wasWaiting ? 'ready-glow' : '';
        let statusHtml = `<div><span class="${readyClass} text-[12px] font-black border border-white/5 bg-white/5 px-8 py-3 rounded-full uppercase tracking-widest transition-all">MÜSAİT</span></div>`;
        
        if(isWaiting) {
            const d = Math.floor(diff/86400000);
            const h = Math.floor((diff/3600000)%24);
            const m = Math.floor((diff/60000)%60);
            const s = Math.floor((diff/1000)%60);
            const perc = (diff / 604800000) * 100;
            
            statusHtml = `
                <div class="flex flex-col items-center">
                    <span class="mono-timer text-orange-500 text-lg font-black">
                        ${d}G <span class="text-white/5">:</span> ${h.toString().padStart(2,'0')}S <span class="text-white/5">:</span> ${m.toString().padStart(2,'0')}D <span class="text-white/5">:</span> ${s.toString().padStart(2,'0')}Sn
                    </span>
                    <div class="progress-container"><div class="progress-bar" style="width: ${perc}%"></div></div>
                </div>`;
        }
        
        tbody.innerHTML += `
            <tr class="hover:bg-blue-600/[0.04] transition-all border-b border-white/[0.02]">
                <td class="p-12"><div class="font-black text-[18px] text-white tracking-tight">${item.name}</div><div class="text-[12px] text-gray-600 mt-2 uppercase font-black tracking-widest">${item.reason}</div></td>
                <td class="p-12 text-center font-black text-4xl italic text-white/5 select-none">${item.count}/3</td>
                <td class="p-12 text-center">${statusHtml}</td>
                <td class="p-12 text-right flex justify-end gap-5">
                    <button onclick="sendAppeal(${item.id})" class="bg-blue-600 hover:bg-blue-500 px-10 py-5 rounded-2xl text-[12px] font-black tracking-widest transition-all ${isWaiting ? 'opacity-5 cursor-not-allowed':''} shadow-xl">İTİRAZ</button>
                    <button onclick="openEdit(${item.id})" class="bg-gray-950 border border-white/5 p-5 rounded-2xl text-gray-600 hover:text-white transition-all">⚙️</button>
                    <button onclick="deleteRow(${item.id})" class="p-5 text-gray-900 hover:text-red-500 transition-all">🗑️</button>
                </td>
            </tr>`;
    });
    updateStats();
}

function exportData() {
    const blob = new Blob([JSON.stringify({data, templates})], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `astaroth_v5.5.json`; a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const imp = JSON.parse(evt.target.result);
            if (imp.data) { data = imp.data; templates = imp.templates || templates; save(); render(); renderTemplates(); }
        } catch (err) { alert('Sistem hatası: Veri bozuk!'); }
    };
    reader.readAsText(file);
}

setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
setInterval(render, 1000);
renderTemplates(); render();
</script>
</body>
</html>
