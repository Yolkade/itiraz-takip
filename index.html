<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Astaroth - Shadow Protocol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
    body { font-family: 'Poppins', sans-serif; background: #03060e; color: #e5e7eb; overflow-x: hidden; }
    .glass { background: rgba(10, 15, 28, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.1); }
    .astaroth-logo { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; background: linear-gradient(180deg, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); }
    .mono-timer { font-family: 'JetBrains Mono', monospace; }
    .folder-btn { padding: 4px 8px; margin-right: 5px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-size: 12px; }
    .folder-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    table { table-layout: fixed; width: 100%; }
    th, td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .drag-over { background: rgba(59, 130, 246, 0.2) !important; }
  </style>
</head>
<body class="p-4 md:p-6 text-sm">
<div class="max-w-[1400px] mx-auto pb-24">

  <header class="flex justify-between items-center mb-10 px-4">
    <div class="astaroth-logo">ASTAROTH</div>
    <div id="liveClock" class="text-2xl font-bold mono-timer text-blue-500 bg-blue-900/10 px-6 py-2 rounded-2xl border border-blue-500/10">00:00:00</div>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
    <div class="space-y-6 lg:col-span-1">
      <div class="glass p-6 rounded-3xl">
          <h2 class="text-[10px] font-bold mb-2 text-blue-500 tracking-widest uppercase">KLASÖRLER</h2>
          <div id="folderList" class="flex flex-wrap gap-2 mb-4"></div>
          <input id="newFolder" placeholder="Yeni klasör" class="w-full p-2 rounded-xl bg-black border border-white/5 outline-none text-xs text-white mb-2" />
          <button onclick="addFolder()" class="w-full bg-blue-700 hover:bg-blue-600 py-2 rounded-xl font-bold text-sm uppercase">Ekle</button>
      </div>

      <div class="glass p-6 rounded-3xl">
          <h2 class="text-[10px] font-bold mb-2 text-emerald-500 tracking-widest uppercase">YENİ HESAP</h2>
          <input id="name" placeholder="Hesap Adı" class="w-full p-3 rounded-xl bg-black border border-white/5 outline-none focus:border-blue-500 text-xs text-white mb-2" />
          <select id="reasonSelect" class="w-full p-3 rounded-xl bg-black border border-white/5 outline-none cursor-pointer text-xs text-white mb-2"></select>
          <button onclick="addRow()" class="w-full bg-blue-700 hover:bg-blue-600 py-3 rounded-xl font-bold text-sm uppercase">Ekle</button>
      </div>
    </div>

    <div class="lg:col-span-3">
      <div class="glass rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6 bg-black/20 border-b border-white/5 space-y-4">
            <input id="search" oninput="render()" placeholder="Ara..." class="bg-transparent border-b border-white/10 flex-1 py-1 outline-none focus:border-blue-500 text-lg text-white" />
        </div>
        <div class="overflow-hidden">
          <table class="w-full">
            <thead class="text-[9px] uppercase text-gray-500 bg-black/30">
              <tr>
                <th class="p-4 w-2/5 text-left">HESAP / NOT</th>
                <th class="p-4 text-center w-24">HAK</th>
                <th class="p-4 text-center w-40">DURUM</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('astar_db_v59')) || [];
let templates = ["Ödenmemiş Bakiye", "Sistemleri Atlama", "Kabul Edilemez İş Uygulamaları"];
let folders = JSON.parse(localStorage.getItem('astar_folders_v1')) || {"Varsayılan": data.map(d => d.id)};
let currentFolder = Object.keys(folders)[0];

function save() {
  localStorage.setItem('astar_db_v59', JSON.stringify(data));
  localStorage.setItem('astar_tpl_v59', JSON.stringify(templates));
  localStorage.setItem('astar_folders_v1', JSON.stringify(folders));
  renderFolders();
  render();
}

function addFolder() {
  const name = document.getElementById('newFolder').value.trim();
  if(name && !folders[name]) { folders[name] = []; document.getElementById('newFolder').value=''; save(); }
}

function renderFolders() {
  const container = document.getElementById('folderList');
  container.innerHTML = '';
  Object.keys(folders).forEach(f => {
    const btn = document.createElement('div');
    btn.innerText = f;
    btn.className = 'folder-btn ' + (f===currentFolder?'active':'');
    btn.onclick = () => { currentFolder=f; renderFolders(); render(); };
    container.appendChild(btn);
  });
}

function addRow() {
  const n = document.getElementById('name').value.trim();
  if(!n) return;
  const id = Date.now();
  data.push({name:n, reason: templates[0], count:0, resetTime:null, id});
  if(!folders[currentFolder]) folders[currentFolder]=[];
  folders[currentFolder].push(id);
  document.getElementById('name').value='';
  save();
}

function render() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML='';
  const q = document.getElementById('search').value.toLowerCase();

  let visibleData = folders[currentFolder].map(id => data.find(d => d.id===id)).filter(Boolean);
  if(q) {
    for(const f in folders){
      for(const id of folders[f]){
        const item = data.find(d=>d.id===id);
        if(item && item.name.toLowerCase().includes(q)) { currentFolder=f; break; }
      }
    }
    visibleData = folders[currentFolder].map(id => data.find(d => d.id===id)).filter(d => d.name.toLowerCase().includes(q));
  }

  visibleData.forEach(item=>{
    const tr = document.createElement('tr');
    tr.draggable=true;
    tr.ondragstart = (e) => { e.dataTransfer.setData('text/plain', item.id); };
    tr.innerHTML=`<td class="p-4">${item.name} - ${item.reason}</td><td class="p-4 text-center">${item.count}</td><td class="p-4 text-center">${item.resetTime?new Date(item.resetTime).toLocaleString():'Hazır'}</td>`;
    tbody.appendChild(tr);
  });
}

// Drag & Drop klasörlere
document.addEventListener('dragover', e => e.preventDefault());
document.getElementById('folderList').addEventListener('drop', e=>{
  e.preventDefault();
  const id = parseInt(e.dataTransfer.getData('text/plain'));
  const folderName = e.target.innerText;
  for(const f in folders) folders[f] = folders[f].filter(x=>x!==id);
  folders[folderName].push(id);
  save();
});

renderFolders(); render();
</script>
</body>
</html>
