<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Astaroth - HD Edition v5.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
    
    body { font-family: 'Poppins', sans-serif; background: #050810; color: #e5e7eb; margin: 0; overflow-x: hidden; }
    .glass { background: rgba(13, 18, 30, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
    
    /* YENİ HAVALI LOGO STİLİ */
    .astaroth-logo {
        font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900;
        letter-spacing: 4px; text-transform: uppercase;
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 50%, #60a5fa 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.5));
        position: relative;
    }

    /* NET OKUNABİLİR SAYAÇ FONTU */
    .mono-timer { 
        font-family: 'JetBrains Mono', monospace; 
        font-weight: 700;
        letter-spacing: 1px;
    }

    @keyframes pulse-alert {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); transform: scale(1); }
      70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); transform: scale(1.03); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); transform: scale(1); }
    }
    .needs-attention { animation: pulse-alert 1.5s infinite; border: 1px solid #10b981 !important; background: rgba(16, 185, 129, 0.25) !important; }

    .progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(to right, #f97316, #ea580c); transition: width 1s linear; }

    .stats-panel { position: fixed; bottom: 20px; left: 20px; padding: 15px 22px; border-radius: 24px; background: rgba(10, 15, 28, 0.95); border: 1px solid rgba(59, 130, 246, 0.3); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .copy-toast { position: fixed; top: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 15px; transform: translateY(-100px); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000; font-weight: bold; }
    
    .filter-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
    .filter-btn.active { background: #1d4ed8; border-color: #3b82f6; color: white; box-shadow: 0 0 15px rgba(30, 64, 175, 0.5); }
    
    select option { background: #0f172a; }
  </style>
</head>
<body class="p-4 md:p-8 text-sm">

  <div id="copyToast" class="copy-toast">Kopyalandı! 📋</div>

  <div class="stats-panel glass space-y-3">
    <div class="flex items-center gap-3"><div class="w-3 h-3 rounded-full bg-white shadow-[0_0_10px_white]"></div><span id="totalCount" class="mono-timer">0</span></div>
    <div class="flex items-center gap-3"><div class="w-3 h-3 rounded-full bg-orange-500 shadow-[0_0_10px_#f97316]"></div><span id="waitingCount" class="mono-timer text-orange-500">0</span></div>
    <div class="flex items-center gap-3"><div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div><span id="readyCount" class="mono-timer text-emerald-500">0</span></div>
  </div>

  <div class="max-w-7xl mx-auto pb-24">
    <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
      <div id="logo" class="astaroth-logo">ASTAROTH</div>
      <div id="liveClock" class="text-3xl font-bold mono-timer bg-blue-950/30 px-8 py-3 rounded-3xl border border-blue-500/20 text-blue-400 shadow-inner">00:00:00</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-4 space-y-6">
        <div class="glass p-8 rounded-[2.5rem]">
            <h2 class="text-[11px] font-bold mb-6 text-blue-400 uppercase tracking-[0.3em]">👤 Yeni Veri Girişi</h2>
            <div class="space-y-4">
              <input id="name" placeholder="Hesap İsmi" class="w-full p-5 rounded-2xl bg-black/40 border border-white/5 outline-none focus:border-blue-500/50 transition-all" />
              <select id="reasonSelect" class="w-full p-5 rounded-2xl bg-black/40 border border-white/5 outline-none cursor-pointer"></select>
              <button onclick="addRow()" class="w-full bg-blue-700 hover:bg-blue-600 py-5 rounded-2xl font-black transition-all uppercase tracking-widest shadow-lg active:scale-95">Sisteme İşle</button>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem]">
          <h2 class="text-[11px] font-bold mb-6 text-emerald-400 uppercase tracking-[0.3em] text-center">Taslak Kütüphanesi</h2>
          <div class="flex gap-2 mb-6">
            <input id="newTemplate" placeholder="Yeni metin..." class="flex-1 p-4 rounded-xl bg-black/40 border border-white/5 text-xs outline-none" />
            <button onclick="addTemplate()" class="bg-emerald-700 px-6 rounded-xl font-bold hover:bg-emerald-600 transition-all">+</button>
          </div>
          <div id="templateList" class="max-h-60 overflow-y-auto space-y-3 pr-2 custom-scrollbar"></div>
        </div>
      </div>

      <div class="lg:col-span-8">
        <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
          <div class="p-6 bg-black/20 border-b border-white/5 space-y-5">
            <div class="flex flex-wrap gap-3">
                <button id="filterAll" onclick="setFilter('all')" class="filter-btn active text-[10px] font-bold px-6 py-2.5 rounded-2xl bg-gray-900/50 uppercase tracking-widest">Tümü</button>
                <button id="filterReady" onclick="setFilter('ready')" class="filter-btn text-[10px] font-bold px-6 py-2.5 rounded-2xl bg-gray-900/50 text-emerald-500 uppercase tracking-widest">Müsaitler</button>
            </div>
            <div class="flex items-center justify-between gap-6">
                <input id="search" oninput="render()" placeholder="Listede hızlı arama..." class="bg-transparent outline-none flex-1 text-lg" />
                <div class="flex gap-3">
                    <button onclick="exportData()" class="text-[10px] font-bold bg-gray-800 hover:bg-gray-700 px-5 py-2.5 rounded-xl transition-all">YEDEK AL</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)" accept=".json" />
                    <button onclick="document.getElementById('importFile').click()" class="text-[10px] font-bold bg-blue-900/40 text-blue-300 px-5 py-2.5 rounded-xl border border-blue-500/30 hover:bg-blue-800/40 transition-all">VERİ YÜKLE</button>
                </div>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="text-[10px] uppercase text-gray-500 bg-black/30">
                <tr>
                  <th class="p-8">HESAP DETAYI</th>
                  <th class="p-8 text-center">HAK</th>
                  <th class="p-8 text-center">DURUM / KALAN SÜRE</th>
                  <th class="p-8 text-right">İŞLEM</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="editModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-2xl">
    <div class="bg-[#0a0f1c] border border-blue-500/30 w-full max-w-lg rounded-[3rem] p-12 space-y-8 shadow-[0_0_50px_rgba(0,0,0,0.8)]">
        <div class="flex justify-between items-center"><h3 class="text-2xl font-bold text-blue-400 tracking-tight">Kayıt Düzenle</h3><button onclick="closeEdit()" class="text-4xl text-gray-600 hover:text-white transition-all">&times;</button></div>
        <div class="space-y-6">
            <div><label class="text-[10px] ml-2 text-gray-500 uppercase tracking-widest">Hesap Başlığı</label><input id="editName" class="w-full p-5 rounded-2xl bg-gray-950 border border-white/5 outline-none focus:border-blue-500/40" /></div>
            <div class="grid grid-cols-2 gap-6">
                <div><label class="text-[10px] ml-2 text-gray-500 uppercase tracking-widest">İtiraz Sayısı</label><input id="editCount" type="number" min="0" max="3" class="w-full p-5 rounded-2xl bg-gray-950 border border-white/5 outline-none" /></div>
                <div><label class="text-[10px] ml-2 text-gray-500 uppercase tracking-widest">Dakika (+/-)</label><input id="editMinutes" type="number" class="w-full p-5 rounded-2xl bg-gray-950 border border-white/5 outline-none" placeholder="Örn: -60" /></div>
            </div>
            <div><label class="text-[10px] ml-2 text-gray-500 uppercase tracking-widest">Başlangıç Tarihi Ayarla</label><input id="editTime" type="datetime-local" class="w-full p-5 rounded-2xl bg-gray-950 border border-white/5 outline-none text-sm" /></div>
        </div>
        <div class="flex gap-4 pt-4">
            <button onclick="closeEdit()" class="flex-1 py-5 rounded-2xl bg-gray-900 font-bold uppercase tracking-widest text-[11px] hover:bg-gray-800 transition-all">İptal</button>
            <button onclick="saveEdit()" class="flex-1 py-5 rounded-2xl bg-blue-700 font-bold shadow-xl uppercase tracking-widest text-[11px] hover:bg-blue-600 transition-all">Güncelle</button>
        </div>
    </div>
  </div>

<script>
let data = JSON.parse(localStorage.getItem('astaroth_v5_db')) || [];
let templates = JSON.parse(localStorage.getItem('astaroth_v5_tpl')) || ["Ödenmemiş Bakiye", "Sistem İhlali"];
let currentFilter = 'all';
let editingIndex = null;

const save = () => {
    localStorage.setItem('astaroth_v5_db', JSON.stringify(data));
    localStorage.setItem('astaroth_v5_tpl', JSON.stringify(templates));
    updateStats();
};

function showToast(msg) {
    const t = document.getElementById('copyToast');
    t.innerText = msg; t.style.transform = 'translateY(0)';
    setTimeout(() => t.style.transform = 'translateY(-100px)', 2500);
}

function updateStats() {
    const total = data.length;
    const waiting = data.filter(x => x.count === 3 && (x.resetTime - Date.now() > 0)).length;
    const ready = total - waiting;
    document.getElementById('totalCount').innerText = total;
    document.getElementById('waitingCount').innerText = waiting;
    document.getElementById('readyCount').innerText = ready;
}

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
    render();
}

function renderTemplates() {
    const list = document.getElementById('templateList');
    const select = document.getElementById('reasonSelect');
    list.innerHTML = ''; select.innerHTML = '';
    templates.forEach((t, i) => {
        list.innerHTML += `<div class="flex items-center gap-3 bg-white/5 p-4 rounded-2xl border border-white/5 group hover:border-emerald-500/30 transition-all"><span class="flex-1 text-[11px] font-medium truncate">${t}</span><button onclick="navigator.clipboard.writeText('${t}').then(()=>showToast('Kopyalandı! 📋'))" class="text-emerald-500 opacity-40 group-hover:opacity-100 transition-all">📋</button><button onclick="deleteTemplate(${i})" class="text-red-900 hover:text-red-500 transition-all px-1">✕</button></div>`;
        select.innerHTML += `<option value="${t}">${t}</option>`;
    });
}

function addTemplate() {
    const v = document.getElementById('newTemplate').value.trim();
    if(v) { templates.push(v); document.getElementById('newTemplate').value = ''; save(); renderTemplates(); }
}

function deleteTemplate(i) { templates.splice(i, 1); save(); renderTemplates(); }

function addRow() {
    const n = document.getElementById('name').value.trim();
    if(!n) return;
    data.push({ name: n, reason: document.getElementById('reasonSelect').value, count: 0, resetTime: null, id: Date.now(), wasWaiting: false });
    document.getElementById('name').value = ''; save(); render();
}

function sendAppeal(i) {
    const list = getProcessedData();
    const item = data.find(x => x.id === list[i].id);
    if(item.count < 3) {
        const template = templates.find(t => t.includes(item.reason)) || item.reason;
        navigator.clipboard.writeText(template).then(() => showToast("İtiraz Metni Kopyalandı! 🚀"));
        item.count++;
        item.wasWaiting = false;
        if(item.count === 3) item.resetTime = Date.now() + 604800000;
        save(); render();
    }
}

function openEdit(i) {
    const list = getProcessedData();
    const item = list[i];
    editingIndex = data.findIndex(x => x.id === item.id);
    document.getElementById('editName').value = item.name;
    document.getElementById('editCount').value = item.count;
    document.getElementById('editMinutes').value = 0;
    let base = item.resetTime ? new Date(item.resetTime - 604800000) : new Date();
    const tz = base.getTimezoneOffset() * 60000;
    document.getElementById('editTime').value = new Date(base - tz).toISOString().slice(0, 16);
    document.getElementById('editModal').classList.remove('hidden');
}

function saveEdit() {
    const item = data[editingIndex];
    item.name = document.getElementById('editName').value;
    item.count = parseInt(document.getElementById('editCount').value);
    const mins = parseInt(document.getElementById('editMinutes').value);
    const tVal = new Date(document.getElementById('editTime').value).getTime();
    if(item.count === 3) {
        let currentReset = item.resetTime || (Date.now() + 604800000);
        let currentBase = currentReset - 604800000;
        if(Math.abs(tVal - currentBase) > 60000) { item.resetTime = tVal + 604800000; } 
        else if(mins !== 0) { item.resetTime = currentReset + (mins * 60000); }
    } else { item.resetTime = null; item.wasWaiting = false; }
    save(); render(); closeEdit();
}

function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

function deleteRow(i) {
    const list = getProcessedData();
    if(confirm('Veriyi silmek istediğinden emin misin?')) { data = data.filter(x => x.id !== list[i].id); save(); render(); }
}

function getProcessedData() {
    let list = [...data];
    const q = document.getElementById('search').value.toLowerCase();
    if(q) list = list.filter(x => x.name.toLowerCase().includes(q));
    if(currentFilter === 'ready') list = list.filter(x => x.count < 3 || (x.resetTime && x.resetTime - Date.now() <= 0));
    return list;
}

function render() {
    const tbody = document.getElementById('tableBody');
    const list = getProcessedData();
    tbody.innerHTML = '';
    
    list.forEach((item, i) => {
        let isWaiting = item.count === 3;
        let diff = isWaiting ? item.resetTime - Date.now() : 0;
        
        if(isWaiting && diff <= 0) { 
            item.count = 0; item.resetTime = null; item.wasWaiting = true;
            isWaiting = false; save(); 
        }

        let readyClass = item.wasWaiting ? 'needs-attention' : '';
        let statusHtml = `<div><span class="${readyClass} text-[10px] text-emerald-500 font-bold border border-emerald-500/20 bg-emerald-500/10 px-5 py-2 rounded-full uppercase tracking-widest transition-all">Müsait</span></div>`;
        
        if(isWaiting) {
            const d = Math.floor(diff/86400000);
            const h = Math.floor((diff/3600000)%24);
            const m = Math.floor((diff/60000)%60);
            const s = Math.floor((diff/1000)%60); // SANİYE EKLENDİ
            const perc = (diff / 604800000) * 100;
            
            // YENİ OKUNAKLI SAYAÇ TASARIMI
            statusHtml = `
                <div class="flex flex-col items-center">
                    <span class="mono-timer text-orange-500 text-sm tracking-tighter">
                        ${d}G <span class="text-white/20">:</span> ${h.toString().padStart(2,'0')}S <span class="text-white/20">:</span> ${m.toString().padStart(2,'0')}D <span class="text-white/20">:</span> ${s.toString().padStart(2,'0')}Sn
                    </span>
                    <div class="progress-container"><div class="progress-bar" style="width: ${perc}%"></div></div>
                </div>`;
        }
        
        tbody.innerHTML += `
            <tr class="hover:bg-blue-600/[0.04] transition-all border-b border-white/[0.03]">
                <td class="p-8"><div class="font-bold text-[15px] text-white tracking-tight">${item.name}</div><div class="text-[10px] text-gray-500 mt-1 uppercase font-semibold">${item.reason}</div></td>
                <td class="p-8 text-center font-black text-2xl italic text-white/10 select-none">${item.count}/3</td>
                <td class="p-8 text-center">${statusHtml}</td>
                <td class="p-8 text-right flex justify-end gap-3">
                    <button onclick="sendAppeal(${i})" class="btn-click bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest transition-all ${isWaiting ? 'opacity-10 cursor-not-allowed':''}">İTİRAZ</button>
                    <button onclick="openEdit(${i})" class="bg-gray-900 border border-white/5 p-3 rounded-2xl text-gray-500 hover:text-white transition-all">⚙️</button>
                    <button onclick="deleteRow(${i})" class="p-3 text-gray-800 hover:text-red-500 transition-all">🗑️</button>
                </td>
            </tr>`;
    });
    updateStats();
}

function exportData() {
    const blob = new Blob([JSON.stringify({data, templates})], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `astaroth_v5.3_final.json`; a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const imp = JSON.parse(evt.target.result);
            if (imp.data) { data = imp.data; templates = imp.templates || templates; save(); render(); renderTemplates(); }
        } catch (err) { alert('Veri okunamadı!'); }
    };
    reader.readAsText(file);
}

setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
setInterval(render, 1000);
renderTemplates(); render();
</script>
</body>
</html>
