<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astaroth v5.9.1 - Shadow Protocol</title>
  
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAF7SURBVHgB7VexS8NQEH7vS5IWRXAnESfRQUXFwUF0E5f+Bc7i5CguTo4OLjo6OPgfiIidvSgd7O4m4uTo4CKCDio4ODi0vS9pYhMba5O06QMPXvK+97vf3Xv37pI4jjEYDAaDwWDwN9BCv5U4jhP05uC9A69D6AL6Anb0VpSST9S4G+v37U5K6Z4fO+OAtv8GvAVwD4Nf+U8X4C6A035m6S1DqVvL4I6/ALwCv9v5fQXA95H1O+n6vWbAnwXwA0v7pXmFvgPglN5C7/b+XgPwvZbeXet3w8D/E8AHlvbXwXp7bS6An28O3ttrL//0L7wS7E5K6baK4Q3wUfTOnV7u7bXbAbwEvvWbL53f/vEAbqF3W5vUv7R/H9Cj2E4VwxfAnz9P3vPofH9T/v57GPhK5w4vI/D3D4Dr9Tvp9jWDL1be9f9/AFfT5z/w5/oN3EH45N/+F/AC/W86v3fB/R5wX3Q66fYNg0H9A4wBfwF4m10V7X4VFAAAAABJRU5ErkJggg==">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
    
    body { font-family: 'Poppins', sans-serif; background: #03060e; color: #e5e7eb; overflow-x: hidden; }
    .glass { background: rgba(10, 15, 28, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.1); }
    
    .astaroth-logo {
        font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 800;
        letter-spacing: 6px; text-transform: uppercase;
        background: linear-gradient(180deg, #fff, #3b82f6);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
    }

    .mono-timer { font-family: 'JetBrains Mono', monospace; }

    @keyframes pulse-ready-alert {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.1); }
      50% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); background: rgba(16, 185, 129, 0.4); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.1); }
    }
    .ready-alert { animation: pulse-ready-alert 1.5s infinite; border: 1px solid #10b981 !important; color: #10b981 !important; font-weight: 900 !important; }

    .stats-overlay { position: fixed; bottom: 25px; left: 25px; z-index: 100; padding: 15px 20px; border-radius: 20px; background: #080c18; border: 1px solid rgba(59, 130, 246, 0.15); }

    .progress-container { width: 100px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
    .progress-bar { height: 100%; background: #f97316; }

    .filter-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #64748b; font-size: 11px; }
    .filter-btn.active { background: #1d4ed8; color: white; border-color: #3b82f6; }

    table { table-layout: fixed; width: 100%; }
    th, td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
  </style>
</head>
<body class="p-4 md:p-6 text-sm">

  <div class="stats-overlay space-y-3">
    <div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full bg-white shadow-[0_0_8px_#fff]"></div><span id="totalCount" class="mono-timer font-bold">0</span></div>
    <div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_#f97316]"></div><span id="waitingCount" class="mono-timer font-bold text-orange-500">0</span></div>
    <div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div><span id="readyCount" class="mono-timer font-bold text-emerald-500">0</span></div>
  </div>

  <div class="max-w-[1400px] mx-auto pb-24">
    <header class="flex justify-between items-center mb-10 px-4">
      <div class="astaroth-logo">ASTAROTH</div>
      <div id="liveClock" class="text-2xl font-bold mono-timer text-blue-500 bg-blue-900/10 px-6 py-2 rounded-2xl border border-blue-500/10">00:00:00</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      <div class="space-y-6 lg:col-span-1">
        <div class="glass p-6 rounded-3xl">
            <h2 class="text-[10px] font-bold mb-5 text-blue-500 tracking-widest uppercase">YENİ KAYIT</h2>
            <div class="space-y-4">
              <input id="name" placeholder="Hesap Adı" class="w-full p-4 rounded-xl bg-black border border-white/5 outline-none focus:border-blue-500 text-xs text-white" />
              <select id="reasonSelect" class="w-full p-4 rounded-xl bg-black border border-white/5 outline-none cursor-pointer text-xs text-white"></select>
              <button onclick="addRow()" class="w-full bg-blue-700 hover:bg-blue-600 py-4 rounded-xl font-bold transition-all text-sm uppercase">Ekle</button>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl">
          <h2 class="text-[10px] font-bold mb-5 text-emerald-500 tracking-widest text-center uppercase">Taslaklar</h2>
          <div class="flex gap-2 mb-4">
            <input id="newTemplate" placeholder="Metin..." class="flex-1 p-3 rounded-lg bg-black border border-white/5 text-xs outline-none text-white" />
            <button onclick="addTemplate()" class="bg-emerald-700 px-4 rounded-lg font-bold">+</button>
          </div>
          <div id="templateList" class="max-h-60 overflow-y-auto space-y-3 pr-2 text-xs"></div>
        </div>
      </div>

      <div class="lg:col-span-3">
        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
          <div class="p-6 bg-black/20 border-b border-white/5 space-y-4">
            <div class="flex gap-3">
                <button id="filterAll" onclick="setFilter('all')" class="filter-btn active px-6 py-2 rounded-xl uppercase font-bold">HEPSİ</button>
                <button id="filterReady" onclick="setFilter('ready')" class="filter-btn px-6 py-2 rounded-xl uppercase font-bold">MÜSAİTLER</button>
                <button id="filterWaiting" onclick="setFilter('waiting')" class="filter-btn px-6 py-2 rounded-xl uppercase font-bold text-orange-400">SÜREDEKİLER</button>
            </div>
            <div class="flex items-center gap-4">
                <input id="search" oninput="render()" placeholder="Ara..." class="bg-transparent border-b border-white/10 flex-1 py-1 outline-none focus:border-blue-500 text-lg text-white" />
                <button onclick="exportData()" class="text-[10px] bg-gray-800 px-4 py-2 rounded-lg">YEDEK</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)" accept=".json" />
                <button onclick="document.getElementById('importFile').click()" class="text-[10px] bg-blue-900/20 text-blue-400 px-4 py-2 rounded-lg border border-blue-500/10">YÜKLE</button>
            </div>
          </div>

          <div class="overflow-hidden">
            <table class="w-full">
              <thead class="text-[9px] uppercase text-gray-500 bg-black/30">
                <tr>
                  <th class="p-5 w-2/5 text-left">HESAP / NOT</th>
                  <th class="p-5 text-center w-24">HAK</th>
                  <th class="p-5 text-center w-40">DURUM</th>
                  <th class="p-5 text-right w-44">KONTROL</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="editModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
    <div class="bg-[#111827] border border-blue-500/20 w-full max-w-lg rounded-[2.5rem] p-10 space-y-8 shadow-2xl">
        <div class="flex justify-between items-center"><h3 class="text-2xl font-bold text-blue-400 italic">Düzenle</h3><button onclick="closeEdit()" class="text-4xl text-gray-600 hover:text-white">&times;</button></div>
        <div class="space-y-6">
            <div><label class="text-[10px] ml-2 text-gray-400 uppercase tracking-widest font-mono">Hesap Adı</label><input id="editName" class="w-full p-4 rounded-xl bg-black border border-white/5 outline-none text-white" /></div>
            <div><label class="text-[10px] ml-2 text-gray-400 uppercase tracking-widest font-mono">İtiraz Notu / Sebebi</label><input id="editReason" class="w-full p-4 rounded-xl bg-black border border-white/5 outline-none text-white" /></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[10px] ml-2 text-gray-400 uppercase tracking-widest font-mono">Hak (0-3)</label><input id="editCount" type="number" min="0" max="3" class="w-full p-4 rounded-xl bg-black border border-white/5 text-center text-white text-lg" /></div>
                <div><label class="text-[10px] ml-2 text-gray-400 uppercase tracking-widest font-mono">Dakika (+/-)</label><input id="editMinutes" type="number" class="w-full p-4 rounded-xl bg-black border border-white/5 text-center text-white" /></div>
            </div>
            <div><label class="text-[10px] ml-2 text-blue-400 uppercase tracking-widest font-black font-mono">📅 Tarihli Zaman Ayarı</label><input id="editTime" type="datetime-local" class="w-full p-4 rounded-xl bg-black border border-white/5 font-mono text-white" /></div>
        </div>
        <div class="flex gap-4 pt-4">
            <button onclick="closeEdit()" class="flex-1 py-4 rounded-xl bg-gray-800 font-bold uppercase text-[11px]">Vazgeç</button>
            <button onclick="saveEdit()" class="flex-1 py-4 rounded-xl bg-blue-600 font-black uppercase text-[11px]">Kaydet</button>
        </div>
    </div>
  </div>

<script>
let data = JSON.parse(localStorage.getItem('astar_db_v59')) || [];
let templates = JSON.parse(localStorage.getItem('astar_tpl_v59')) || ["Ödenmemiş Bakiye", "Sistemleri Atlama", "Kabul Edilemez İş Uygulamaları"];
let currentFilter = 'all';
let editingIndex = null;

// Kayıt ve İstatistik
const save = () => {
    localStorage.setItem('astar_db_v59', JSON.stringify(data));
    localStorage.setItem('astar_tpl_v59', JSON.stringify(templates));
    updateStats();
};

function updateStats() {
    const now = Date.now();
    const total = data.length;
    const waiting = data.filter(x => x.count >= 3 && (x.resetTime - now > 0)).length;
    const ready = total - waiting;
    document.getElementById('totalCount').innerText = total;
    document.getElementById('waitingCount').innerText = waiting;
    document.getElementById('readyCount').innerText = ready;
}

// Filtreleme
function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
    render();
}

// Saat ve Otomatik Yenileme
setInterval(() => {
    document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('tr-TR');
    renderTimers();
}, 1000);

function renderTimers() {
    const now = Date.now();
    data.forEach((item, index) => {
        const timerEl = document.getElementById(`timer-${index}`);
        const rowEl = document.getElementById(`row-${index}`);
        if (!timerEl) return;

        const diff = item.resetTime - now;
        if (item.count >= 3 && diff > 0) {
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            timerEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            const percent = Math.max(0, (diff / (24 * 60 * 60 * 1000)) * 100);
            const bar = document.getElementById(`bar-${index}`);
            if (bar) bar.style.width = percent + "%";
        } else {
            timerEl.innerText = "HAZIR";
            timerEl.className = "ready-alert px-3 py-1 rounded-lg text-[10px]";
        }
    });
}

// Tabloyu Çiz
function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const now = Date.now();
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    data.forEach((item, index) => {
        const isWaiting = item.count >= 3 && (item.resetTime - now > 0);
        
        if (currentFilter === 'ready' && isWaiting) return;
        if (currentFilter === 'waiting' && !isWaiting) return;
        if (search && !item.name.toLowerCase().includes(search) && !item.reason.toLowerCase().includes(search)) return;

        const tr = document.createElement('tr');
        tr.id = `row-${index}`;
        tr.className = "hover:bg-white/[0.02] transition-colors";
        tr.innerHTML = `
            <td class="p-5">
                <div class="font-bold text-white text-base">${item.name}</div>
                <div class="text-[10px] text-gray-500 mt-1 uppercase">${item.reason}</div>
            </td>
            <td class="p-5 text-center font-mono text-lg ${item.count >= 3 ? 'text-red-500' : 'text-blue-400'}">${item.count}/3</td>
            <td class="p-5">
                <div class="flex flex-col items-center gap-2">
                    <span id="timer-${index}" class="mono-timer font-bold text-xs">--:--:--</span>
                    ${isWaiting ? `<div class="progress-container"><div id="bar-${index}" class="progress-bar"></div></div>` : ''}
                </div>
            </td>
            <td class="p-5 text-right space-x-2">
                <button onclick="increment(${index})" class="bg-blue-600/20 text-blue-400 p-2 rounded-lg hover:bg-blue-600 hover:text-white">🚀</button>
                <button onclick="openEdit(${index})" class="bg-gray-800 p-2 rounded-lg hover:bg-white hover:text-black text-xs">DÜZENLE</button>
                <button onclick="deleteRow(${index})" class="text-red-900 hover:text-red-500 p-2">✕</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
    renderTimers();
    updateStats();
}

// Veri İşlemleri
function addRow() {
    const name = document.getElementById('name').value;
    const reason = document.getElementById('reasonSelect').value;
    if (!name) return alert("İsim boş olamaz!");
    
    data.push({
        name,
        reason,
        count: 0,
        resetTime: 0,
        created: Date.now()
    });
    document.getElementById('name').value = '';
    save();
    render();
}

function increment(index) {
    data[index].count++;
    if (data[index].count >= 3) {
        data[index].resetTime = Date.now() + (24 * 60 * 60 * 1000); // 24 Saat
    }
    save();
    render();
}

function deleteRow(index) {
    if(confirm('Silinsin mi?')) {
        data.splice(index, 1);
        save();
        render();
    }
}

// Modal İşlemleri
function openEdit(index) {
    editingIndex = index;
    const item = data[index];
    document.getElementById('editName').value = item.name;
    document.getElementById('editReason').value = item.reason;
    document.getElementById('editCount').value = item.count;
    document.getElementById('editMinutes').value = 0;
    
    if (item.resetTime > 0) {
        const d = new Date(item.resetTime);
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        document.getElementById('editTime').value = d.toISOString().slice(0,16);
    }

    document.getElementById('editModal').classList.remove('hidden');
}

function saveEdit() {
    const item = data[editingIndex];
    item.name = document.getElementById('editName').value;
    item.reason = document.getElementById('editReason').value;
    item.count = parseInt(document.getElementById('editCount').value);
    
    const manualTime = document.getElementById('editTime').value;
    if (manualTime) {
        item.resetTime = new Date(manualTime).getTime();
    }

    const addMin = parseInt(document.getElementById('editMinutes').value);
    if (addMin !== 0) {
        item.resetTime = (item.resetTime || Date.now()) + (addMin * 60000);
    }

    closeEdit();
    save();
    render();
}

function closeEdit() {
    document.getElementById('editModal').classList.add('hidden');
    editingIndex = null;
}

// Taslak Yönetimi
function addTemplate() {
    const val = document.getElementById('newTemplate').value;
    if (val) {
        templates.push(val);
        document.getElementById('newTemplate').value = '';
        save();
        renderTemplates();
    }
}

function renderTemplates() {
    const list = document.getElementById('templateList');
    const select = document.getElementById('reasonSelect');
    list.innerHTML = '';
    select.innerHTML = '';

    templates.forEach((t, i) => {
        // Listeye ekle
        const div = document.createElement('div');
        div.className = "flex justify-between items-center bg-white/5 p-2 rounded group";
        div.innerHTML = `<span>${t}</span><button onclick="removeTemplate(${i})" class="opacity-0 group-hover:opacity-100 text-red-500">✕</button>`;
        list.appendChild(div);

        // Selectbox'a ekle
        const opt = document.createElement('option');
        opt.value = t;
        opt.innerText = t;
        select.appendChild(opt);
    });
}

function removeTemplate(i) {
    templates.splice(i, 1);
    save();
    renderTemplates();
}

// Yedekleme
function exportData() {
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `astaroth_backup_${new Date().toLocaleDateString()}.json`;
    a.click();
}

function importData(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (ev) => {
        data = JSON.parse(ev.target.result);
        save();
        render();
    };
    reader.readAsText(file);
}

// Başlat
renderTemplates();
render();
</script>
</body>
</html>
