    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
    body { font-family: 'Poppins', sans-serif; background: #03060e; color: #e5e7eb; overflow-x: hidden; }
    .glass { background: rgba(10, 15, 28, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.1); }
    .astaroth-logo { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; background: linear-gradient(180deg, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); }
    .mono-timer { font-family: 'JetBrains Mono', monospace; }
    table { table-layout: fixed; width: 100%; }
    th, td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

<body class="p-4 md:p-6 text-sm">

<div class="max-w-[1400px] mx-auto pb-24">
<header class="flex justify-between items-center mb-10 px-4">
  <div class="astaroth-logo">ASTAROTH</div>
  <div id="liveClock" class="text-2xl font-bold mono-timer text-blue-500 bg-blue-900/10 px-6 py-2 rounded-2xl border border-blue-500/10">00:00:00</div>
</header>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
<div class="space-y-6 lg:col-span-1">
<div class="glass p-6 rounded-3xl">
<h2 class="text-[10px] font-bold mb-5 text-blue-500 tracking-widest uppercase">YENİ KAYIT</h2>
<div class="space-y-4">
<input id="name" placeholder="Hesap Adı" class="w-full p-4 rounded-xl bg-black border border-white/5 outline-none focus:border-blue-500 text-xs text-white" />
<select id="folderSelect" class="w-full p-4 rounded-xl bg-black border border-white/5 outline-none cursor-pointer text-xs text-white"></select>
<button onclick="addRow()" class="w-full bg-blue-700 hover:bg-blue-600 py-4 rounded-xl font-bold transition-all text-sm uppercase">Ekle</button>
</div>
<div class="mt-4 flex gap-2">
<input id="newFolder" placeholder="Yeni Klasör" class="flex-1 p-3 rounded-lg bg-black border border-white/5 text-xs outline-none text-white" />
<button onclick="addFolder()" class="bg-blue-500 px-4 rounded-lg font-bold">+</button>
</div>
</div>
</div>

<div class="lg:col-span-3">
<div class="glass rounded-3xl overflow-hidden shadow-2xl">
<div class="overflow-hidden">
<table class="w-full">
<thead class="text-[9px] uppercase text-gray-500 bg-black/30">
<tr>
<th class="p-5 w-2/5 text-left">HESAP / NOT</th>
<th class="p-5 text-center w-1/5">KLASÖR</th>
<th class="p-5 text-center w-1/5">SİL</th>
</tr>
</thead>
<tbody id="accountTable" class="text-[11px]">
<!-- Dinamik olarak eklenecek -->
</tbody>
</table>
</div>
</div>
</div>
</div>
</div>

<script>
const accountTable = document.getElementById('accountTable');
const folderSelect = document.getElementById('folderSelect');

let folders = ['Genel'];

function updateFolderSelect() {
  folderSelect.innerHTML = '';
  folders.forEach(f => {
    const option = document.createElement('option');
    option.value = f;
    option.textContent = f;
    folderSelect.appendChild(option);
  });
}

// Yeni klasör ekle
function addFolder() {
  const folderName = document.getElementById('newFolder').value.trim();
  if (!folderName) return alert('Klasör adı boş olamaz!');
  if (folders.includes(folderName)) return alert('Bu klasör zaten var!');
  folders.push(folderName);
  updateFolderSelect();
  document.getElementById('newFolder').value = '';
}

// Yeni hesap ekle
function addRow() {
  const nameInput = document.getElementById('name');
  const name = nameInput.value.trim();
  const folder = folderSelect.value;
  if (!name) return alert('Hesap adı boş olamaz!');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="p-5">${name}</td>
    <td class="p-5 text-center">${folder}</td>
    <td class="p-5 text-center"><button onclick="deleteRow(this)" class="bg-red-500 px-3 py-1 rounded-lg text-xs">Sil</button></td>
  `;
  accountTable.appendChild(tr);
  nameInput.value = '';
}

// Satır sil
function deleteRow(btn) {
  btn.closest('tr').remove();
}

// Saat
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('liveClock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// Başlangıçta 'Genel' klasörü
updateFolderSelect();
</script>

</body>
