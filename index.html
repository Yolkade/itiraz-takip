<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İtiraz Kontrol Merkezi - Full Yönetim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');
    body { font-family: 'Poppins', sans-serif; background: #0b0f1a; color: #e5e7eb; }
    .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(75, 85, 99, 0.3); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    input, select, textarea { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; outline: none !important; }
    input:focus { border-color: #3b82f6 !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
  </style>
</head>
<body class="p-4 md:p-8 custom-scrollbar">

  <div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
      <h1 class="text-3xl font-black tracking-tighter italic text-blue-500">CONTROL PANEL <span class="text-white text-xs">v3.0</span></h1>
      <div id="liveClock" class="text-2xl font-bold mono bg-gray-900 px-6 py-2 rounded-2xl border border-blue-900/30 shadow-lg shadow-blue-500/10">00:00:00</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <div class="lg:col-span-4 space-y-6">
        
        <div class="glass p-6 rounded-3xl shadow-2xl">
          <h2 class="text-lg font-bold mb-4 text-blue-400 flex items-center gap-2">👤 Yeni Hesap</h2>
          <div class="space-y-3">
            <input id="name" placeholder="Hesap Adı" class="w-full p-3 rounded-xl text-sm" />
            <select id="reasonSelect" class="w-full p-3 rounded-xl text-sm cursor-pointer"></select>
            <button onclick="addRow()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition shadow-lg shadow-blue-600/20">LİSTEYE EKLE</button>
          </div>
        </div>

        <div class="glass p-6 rounded-3xl shadow-2xl">
          <h2 class="text-lg font-bold mb-4 text-emerald-400 flex items-center gap-2">📝 Not Taslakları</h2>
          <div class="space-y-3">
            <div class="flex gap-2">
              <input id="newTemplate" placeholder="Yeni not metni..." class="flex-1 p-2 rounded-lg text-xs" />
              <button onclick="addTemplate()" class="bg-emerald-600 px-4 rounded-lg text-xs font-bold">+</button>
            </div>
            <div id="templateList" class="max-h-48 overflow-y-auto space-y-2 custom-scrollbar pr-2">
              </div>
          </div>
        </div>

      </div>

      <div class="lg:col-span-8">
        <div class="glass rounded-3xl shadow-2xl overflow-hidden">
          <div class="p-4 bg-gray-900/50 flex justify-between gap-4">
            <input id="search" oninput="render()" placeholder="Hızlı ara..." class="bg-transparent border-none w-full p-1 text-sm" />
            <button onclick="exportData()" class="text-xs bg-gray-800 px-3 py-1 rounded-lg">Yedek Al</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="text-[10px] uppercase font-bold text-gray-500 bg-black/20">
                <tr>
                  <th class="p-5">Hesap / Not</th>
                  <th class="p-5 text-center">İtiraz</th>
                  <th class="p-5">Geri Sayım</th>
                  <th class="p-5 text-right">İşlem</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
    <div class="bg-[#111827] border border-gray-700 w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden">
      <div class="p-8 border-b border-white/5 bg-white/5 flex justify-between items-center">
        <h3 class="text-xl font-bold">Kayıt Düzenle</h3>
        <button onclick="closeEdit()" class="text-2xl text-gray-500 hover:text-white">&times;</button>
      </div>

      <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
        <div class="space-y-4">
          <div>
            <label class="text-xs text-blue-400 font-bold mb-1 block uppercase">Hesap Bilgileri</label>
            <input id="editName" class="w-full p-3 rounded-xl mb-2" />
            <input id="editReason" class="w-full p-3 rounded-xl" />
          </div>
          <div>
            <label class="text-xs text-orange-400 font-bold mb-1 block uppercase">İtiraz Hakkı (0-3)</label>
            <input id="editCount" type="number" min="0" max="3" class="w-full p-3 rounded-xl" />
          </div>
        </div>

        <div class="bg-blue-900/20 p-5 rounded-3xl border border-blue-500/20 space-y-4">
          <label class="text-xs text-emerald-400 font-bold block uppercase">⏱️ Zaman Ayarı</label>
          <input id="editTime" type="datetime-local" class="w-full p-3 rounded-xl bg-black" />
          <p class="text-[10px] text-gray-500 italic">İtirazın yapıldığı anı seçin, sistem 7 günü o andan başlatır.</p>
          <hr class="border-white/5">
          <input id="editMinutes" type="number" placeholder="Veya manuel kalan dakika..." class="w-full p-3 rounded-xl" />
        </div>
      </div>

      <div class="p-8 bg-black/20 flex gap-4">
        <button onclick="closeEdit()" class="flex-1 py-4 rounded-2xl font-bold bg-gray-800">İptal</button>
        <button onclick="saveEdit()" class="flex-1 py-4 rounded-2xl font-bold bg-blue-600">Güncelle</button>
      </div>
    </div>
  </div>

<script>
let data = JSON.parse(localStorage.getItem('itiraz_full_v3')) || [];
let templates = JSON.parse(localStorage.getItem('itiraz_templates_v3')) || [
  "Ödenmemiş Bakiye", "Sistemleri Atlama", "Kabul Edilemez İş Uygulamaları", "Şüpheli Ödeme", "Doğrulama"
];
let editingIndex = null;

const saveData = () => {
  localStorage.setItem('itiraz_full_v3', JSON.stringify(data));
  localStorage.setItem('itiraz_templates_v3', JSON.stringify(templates));
};

// TASLAK YÖNETİMİ
function renderTemplates() {
  const list = document.getElementById('templateList');
  const select = document.getElementById('reasonSelect');
  list.innerHTML = '';
  select.innerHTML = '';
  
  templates.forEach((t, i) => {
    list.innerHTML += `
      <div class="flex justify-between items-center bg-gray-800/50 p-2 rounded-lg text-[10px]">
        <span class="truncate pr-2">${t}</span>
        <button onclick="deleteTemplate(${i})" class="text-red-500 font-bold">Sil</button>
      </div>`;
    select.innerHTML += `<option value="${t}">${t}</option>`;
  });
}

function addTemplate() {
  const val = document.getElementById('newTemplate').value.trim();
  if(val) { templates.push(val); document.getElementById('newTemplate').value = ''; saveData(); renderTemplates(); }
}

function deleteTemplate(i) { templates.splice(i, 1); saveData(); renderTemplates(); }

// TABLO İŞLEMLERİ
function addRow() {
  const n = document.getElementById('name').value.trim();
  const r = document.getElementById('reasonSelect').value;
  if(!n) return alert('İsim girin!');
  data.push({ name: n, reason: r, count: 0, resetTime: null });
  document.getElementById('name').value = '';
  saveData(); render();
}

function sendAppeal(i) {
  const item = filteredData()[i];
  if(item.count < 3) {
    item.count++;
    if(item.count === 3) item.resetTime = Date.now() + 604800000;
    saveData(); render();
  }
}

// EDİT MODAL
function openEdit(i) {
  const item = filteredData()[i];
  editingIndex = data.indexOf(item);
  document.getElementById('editName').value = item.name;
  document.getElementById('editReason').value = item.reason;
  document.getElementById('editCount').value = item.count;
  
  // Zamanı yükle
  let base = item.resetTime ? new Date(item.resetTime - 604800000) : new Date();
  const tz = base.getTimezoneOffset() * 60000;
  document.getElementById('editTime').value = new Date(base - tz).toISOString().slice(0, 16);
  document.getElementById('editMinutes').value = item.resetTime ? Math.round((item.resetTime - Date.now())/60000) : 0;
  
  document.getElementById('editModal').classList.remove('hidden');
}

function saveEdit() {
  const item = data[editingIndex];
  item.name = document.getElementById('editName').value;
  item.reason = document.getElementById('editReason').value;
  item.count = parseInt(document.getElementById('editCount').value);
  
  const timeVal = new Date(document.getElementById('editTime').value).getTime();
  const minsVal = parseInt(document.getElementById('editMinutes').value);

  if(item.count === 3) {
    // Eğer saat değiştirildiyse saati baz al, yoksa dakikayı baz al
    let oldBase = item.resetTime ? (item.resetTime - 604800000) : 0;
    if(Math.abs(timeVal - oldBase) > 60000) {
      item.resetTime = timeVal + 604800000;
    } else if(minsVal > 0) {
      item.resetTime = Date.now() + (minsVal * 60000);
    }
  } else {
    item.resetTime = null;
  }
  
  saveData(); render(); closeEdit();
}

function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

function deleteRow(i) {
  if(confirm('Silinsin mi?')) { data.splice(data.indexOf(filteredData()[i]), 1); saveData(); render(); }
}

const filteredData = () => {
  const q = document.getElementById('search').value.toLowerCase();
  return data.filter(x => x.name.toLowerCase().includes(q) || x.reason.toLowerCase().includes(q));
};

function render() {
  const tbody = document.getElementById('tableBody');
  const list = filteredData();
  tbody.innerHTML = '';
  list.forEach((item, i) => {
    let status = '<span class="text-[10px] text-emerald-500 font-bold border border-emerald-900 bg-emerald-950/20 px-2 py-1 rounded">MÜSAİT</span>';
    if(item.count === 3) {
      const diff = item.resetTime - Date.now();
      if(diff <= 0) { item.count = 0; item.resetTime = null; saveData(); }
      else {
        const d = Math.floor(diff/86400000), h = Math.floor((diff/3600000)%24), m = Math.floor((diff/60000)%60), s = Math.floor((diff/1000)%60);
        status = `<span class="mono text-orange-500 font-bold text-sm">${d}g ${h}:${m}:${s}</span>`;
      }
    }
    tbody.innerHTML += `
      <tr class="hover:bg-white/5 transition">
        <td class="p-5">
          <div class="font-bold text-sm">${item.name}</div>
          <div class="text-[10px] text-gray-500">${item.reason}</div>
        </td>
        <td class="p-5 text-center font-bold italic text-gray-600">${item.count}/3</td>
        <td class="p-5">${status}</td>
        <td class="p-5 text-right flex justify-end gap-2">
          <button onclick="sendAppeal(${i})" class="bg-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold ${item.count >= 3 ? 'opacity-20 cursor-not-allowed':''}">İtiraz</button>
          <button onclick="openEdit(${i})" class="bg-gray-800 p-1.5 rounded-lg">⚙️</button>
          <button onclick="deleteRow(${i})" class="text-gray-700 p-1.5 hover:text-red-500">🗑️</button>
        </td>
      </tr>`;
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify({data, templates})], {type:"application/json"});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `itiraz_panel_yedek.json`; a.click();
}

setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
setInterval(render, 1000);
renderTemplates();
render();
</script>
</body>
</html>
