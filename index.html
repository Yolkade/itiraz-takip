<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Astaroth v5.6 - Stable</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');
    
    body { font-family: 'Poppins', sans-serif; background: #03060e; color: #e5e7eb; overflow-x: hidden; }
    .glass { background: rgba(10, 15, 28, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.1); }
    
    .astaroth-logo {
        font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 800;
        letter-spacing: 6px; text-transform: uppercase;
        background: linear-gradient(180deg, #fff, #3b82f6);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
    }

    .mono-timer { font-family: 'JetBrains Mono', monospace; }

    @keyframes pulse-ready {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.3); }
      70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    .ready-glow { animation: pulse-ready 2s infinite; border-color: #10b981 !important; color: #10b981 !important; }

    .progress-container { width: 100px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
    .progress-bar { height: 100%; background: #f97316; }

    .copy-toast { position: fixed; top: 20px; right: 20px; background: #3b82f6; padding: 12px 24px; border-radius: 12px; transform: translateY(-100px); transition: 0.4s; z-index: 1000; font-weight: bold; font-size: 13px; }
    
    .filter-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #64748b; font-size: 11px; }
    .filter-btn.active { background: #1d4ed8; color: white; border-color: #3b82f6; }

    /* Yana kaydırmayı engellemek için tabloyu sıkıştırdım */
    table { table-layout: fixed; width: 100%; }
    th, td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body class="p-4 md:p-6">

  <div id="copyToast" class="copy-toast">KOPYALANDI ⚡</div>

  <div class="max-w-[1400px] mx-auto">
    <header class="flex justify-between items-center mb-10 px-4">
      <div class="astaroth-logo">ASTAROTH</div>
      <div id="liveClock" class="text-2xl font-bold mono-timer text-blue-500 bg-blue-900/10 px-6 py-2 rounded-2xl border border-blue-500/10">00:00:00</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      <div class="space-y-6">
        <div class="glass p-6 rounded-3xl">
            <h2 class="text-[10px] font-bold mb-5 text-blue-500 tracking-widest">YENİ KAYIT</h2>
            <div class="space-y-4">
              <input id="name" placeholder="Hesap Adı" class="w-full p-4 rounded-xl bg-black/50 border border-white/5 outline-none focus:border-blue-500/30 transition-all text-sm" />
              <select id="reasonSelect" class="w-full p-4 rounded-xl bg-black/50 border border-white/5 outline-none cursor-pointer text-sm"></select>
              <button onclick="addRow()" class="w-full bg-blue-700 hover:bg-blue-600 py-4 rounded-xl font-bold transition-all text-sm">EKLE</button>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl">
          <h2 class="text-[10px] font-bold mb-5 text-emerald-500 tracking-widest text-center">TASLAKLAR</h2>
          <div class="flex gap-2 mb-4">
            <input id="newTemplate" placeholder="Metin..." class="flex-1 p-3 rounded-lg bg-black border border-white/5 text-xs outline-none" />
            <button onclick="addTemplate()" class="bg-emerald-700 px-4 rounded-lg font-bold">+</button>
          </div>
          <div id="templateList" class="max-h-60 overflow-y-auto space-y-3 pr-2 text-xs"></div>
        </div>
      </div>

      <div class="lg:col-span-3">
        <div class="glass rounded-[2rem] overflow-hidden">
          <div class="p-6 bg-black/20 border-b border-white/5 space-y-4">
            <div class="flex gap-3">
                <button id="filterAll" onclick="setFilter('all')" class="filter-btn active px-6 py-2 rounded-xl uppercase font-bold">HEPSİ</button>
                <button id="filterReady" onclick="setFilter('ready')" class="filter-btn px-6 py-2 rounded-xl uppercase font-bold">MÜSAİTLER</button>
                <button id="filterWaiting" onclick="setFilter('waiting')" class="filter-btn px-6 py-2 rounded-xl uppercase font-bold text-orange-400">SÜREDEKİLER</button>
            </div>
            <div class="flex items-center gap-4">
                <input id="search" oninput="render()" placeholder="Listede ara..." class="bg-transparent border-b border-white/10 flex-1 py-1 outline-none focus:border-blue-500 text-lg" />
                <button onclick="exportData()" class="text-[10px] bg-gray-800 px-4 py-2 rounded-lg">YEDEK</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)" />
                <button onclick="document.getElementById('importFile').click()" class="text-[10px] bg-blue-900/20 text-blue-400 px-4 py-2 rounded-lg border border-blue-500/10">YÜKLE</button>
            </div>
          </div>

          <div class="overflow-hidden">
            <table class="w-full">
              <thead class="text-[9px] uppercase text-gray-500 bg-black/30">
                <tr>
                  <th class="p-5 w-2/5">HESAP / NOT</th>
                  <th class="p-5 text-center w-24">HAK</th>
                  <th class="p-5 text-center w-40">DURUM</th>
                  <th class="p-5 text-right w-44">KONTROL</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="editModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
    <div class="bg-[#0a0f1c] border border-blue-500/20 w-full max-w-md rounded-3xl p-8 space-y-6">
        <h3 class="text-xl font-bold text-blue-500">DÜZENLE</h3>
        <input id="editName" class="w-full p-4 rounded-xl bg-black border border-white/5 outline-none" />
        <div class="grid grid-cols-2 gap-4">
            <input id="editCount" type="number" min="0" max="3" class="w-full p-4 rounded-xl bg-black border border-white/5 text-center" />
            <input id="editMinutes" type="number" placeholder="+/- Dakika" class="w-full p-4 rounded-xl bg-black border border-white/5 text-center" />
        </div>
        <div class="flex gap-4">
            <button onclick="closeEdit()" class="flex-1 py-4 rounded-xl bg-gray-800">İPTAL</button>
            <button onclick="saveEdit()" class="flex-1 py-4 rounded-xl bg-blue-700">KAYDET</button>
        </div>
    </div>
  </div>

<script>
let data = JSON.parse(localStorage.getItem('astar_db')) || [];
let templates = JSON.parse(localStorage.getItem('astar_tpl')) || ["Ödenmemiş Bakiye", "Sistemleri Atlama", "Kabul Edilemez İş Uygulamaları"];
let currentFilter = 'all';
let editingIndex = null;

const save = () => {
    localStorage.setItem('astar_db', JSON.stringify(data));
    localStorage.setItem('astar_tpl', JSON.stringify(templates));
};

function showToast(msg) {
    const t = document.getElementById('copyToast');
    t.innerText = msg; t.style.transform = 'translateY(0)';
    setTimeout(() => t.style.transform = 'translateY(-100px)', 2000);
}

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
    render();
}

function renderTemplates() {
    const list = document.getElementById('templateList');
    const select = document.getElementById('reasonSelect');
    list.innerHTML = ''; select.innerHTML = '';
    templates.forEach((t, i) => {
        list.innerHTML += `<div class="flex items-center bg-white/5 p-3 rounded-xl border border-white/5 group"><span class="flex-1 truncate">${t}</span><button onclick="navigator.clipboard.writeText('${t}').then(()=>showToast('METİN KOPYALANDI'))" class="text-emerald-500 mx-2">📋</button><button onclick="deleteTemplate(${i})" class="text-red-900 hover:text-red-500">✕</button></div>`;
        select.innerHTML += `<option value="${t}">${t}</option>`;
    });
}

function addTemplate() {
    const v = document.getElementById('newTemplate').value.trim();
    if(v) { templates.push(v); document.getElementById('newTemplate').value = ''; save(); renderTemplates(); }
}

function deleteTemplate(i) { templates.splice(i, 1); save(); renderTemplates(); }

function addRow() {
    const n = document.getElementById('name').value.trim();
    if(!n) return;
    data.push({ name: n, reason: document.getElementById('reasonSelect').value, count: 0, resetTime: null, id: Date.now() });
    document.getElementById('name').value = ''; save(); render();
}

function sendAppeal(id) {
    const item = data.find(x => x.id === id);
    if(item && item.count < 3) {
        navigator.clipboard.writeText(item.reason).then(() => showToast("KOPYALANDI"));
        item.count++;
        if(item.count === 3) item.resetTime = Date.now() + 604800000;
        save(); render();
    }
}

function openEdit(id) {
    const item = data.find(x => x.id === id);
    editingIndex = data.findIndex(x => x.id === id);
    document.getElementById('editName').value = item.name;
    document.getElementById('editCount').value = item.count;
    document.getElementById('editMinutes').value = 0;
    document.getElementById('editModal').classList.remove('hidden');
}

function saveEdit() {
    const item = data[editingIndex];
    item.name = document.getElementById('editName').value;
    item.count = parseInt(document.getElementById('editCount').value);
    const mins = parseInt(document.getElementById('editMinutes').value);
    if(item.count === 3) {
        if(!item.resetTime) item.resetTime = Date.now() + 604800000;
        if(mins !== 0) item.resetTime += (mins * 60000);
    } else { item.resetTime = null; }
    save(); render(); closeEdit();
}

function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

// VERİ KAYBI FİX: SADECE HEDEF ID'Yİ SİLER
function deleteRow(id) {
    if(confirm('Hesap silinsin mi?')) {
        data = data.filter(x => x.id !== id);
        save();
        render();
    }
}

function render() {
    const tbody = document.getElementById('tableBody');
    let list = [...data];
    const q = document.getElementById('search').value.toLowerCase();
    
    if(q) list = list.filter(x => x.name.toLowerCase().includes(q));
    if(currentFilter === 'ready') list = list.filter(x => x.count < 3 || (x.resetTime && x.resetTime - Date.now() <= 0));
    else if(currentFilter === 'waiting') list = list.filter(x => x.count === 3 && (x.resetTime - Date.now() > 0));

    tbody.innerHTML = '';
    list.forEach((item) => {
        let isWaiting = item.count === 3 && item.resetTime && (item.resetTime - Date.now() > 0);
        let diff = isWaiting ? item.resetTime - Date.now() : 0;
        
        if(item.count === 3 && item.resetTime && diff <= 0) { 
            item.count = 0; item.resetTime = null; save(); isWaiting = false;
        }

        let statusHtml = `<div><span class="text-[10px] font-bold border border-white/10 px-4 py-1.5 rounded-full bg-white/5">MÜSAİT</span></div>`;
        if(isWaiting) {
            const d = Math.floor(diff/86400000);
            const h = Math.floor((diff/3600000)%24);
            const m = Math.floor((diff/60000)%60);
            const perc = (diff / 604800000) * 100;
            statusHtml = `<div class="flex flex-col items-center gap-1"><span class="mono-timer text-orange-500 text-xs font-bold">${d}G ${h}S ${m}D</span><div class="progress-container"><div class="progress-bar" style="width: ${perc}%"></div></div></div>`;
        }
        
        tbody.innerHTML += `
            <tr class="border-b border-white/[0.02]">
                <td class="p-4"><div class="font-bold text-sm truncate">${item.name}</div><div class="text-[10px] text-gray-500 truncate">${item.reason}</div></td>
                <td class="p-4 text-center text-xl font-bold opacity-10 italic">${item.count}/3</td>
                <td class="p-4 text-center">${statusHtml}</td>
                <td class="p-4 text-right">
                    <div class="flex justify-end gap-2">
                        <button onclick="sendAppeal(${item.id})" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl text-[10px] font-bold ${isWaiting ? 'opacity-10 cursor-not-allowed':''}">İTİRAZ</button>
                        <button onclick="openEdit(${item.id})" class="text-gray-500 hover:text-white">⚙️</button>
                        <button onclick="deleteRow(${item.id})" class="text-gray-800 hover:text-red-500 text-lg">🗑️</button>
                    </div>
                </td>
            </tr>`;
    });
}

function exportData() {
    const blob = new Blob([JSON.stringify({data, templates})], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `astaroth_safe.json`; a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const imp = JSON.parse(evt.target.result);
            if (imp.data) { data = imp.data; templates = imp.templates || templates; save(); render(); renderTemplates(); }
        } catch (err) { alert('Hata!'); }
    };
    reader.readAsText(file);
}

setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
setInterval(render, 10000);
renderTemplates(); render();
</script>
</body>
</html>
