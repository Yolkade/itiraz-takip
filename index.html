<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Astaroth - Shadow Protocol</title>

<link rel="icon" type="image/png" href="data:image/png;base64,iVBOR... (senin orijinal favicon)">

<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Poppins:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');

/* --- Mevcut stil kodun aynen buraya --- */

/* Yeni ekleme: klasör ikonu ve modal stil */
.folder-icon { cursor:pointer; font-size:24px; color:#3b82f6; transition:0.3s; }
.folder-icon:hover { color:#60a5fa; }

/* modal styles */
.modal { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; }
.modal-content { background:#111827; padding:20px; border-radius:1rem; max-width:400px; width:90%; }
.modal-content input { width:100%; padding:10px; margin-bottom:10px; border-radius:0.5rem; border:none; outline:none; }
.modal-content button { margin-right:5px; }
</style>
</head>
<body class="p-4 md:p-6 text-sm">

<!-- --- Mevcut header --- -->
<header class="flex justify-between items-center mb-10 px-4">
  <div class="astaroth-logo">ASTAROTH</div>
  <div class="flex items-center space-x-4">
    <div id="folderIcon" class="folder-icon" title="Klasörler">📁</div>
  </div>
</header>

<!-- --- Mevcut sitenin tüm HTML yapısı buraya --- -->
<!-- Örnek: istatistik overlay, grid, form, tablo, vb. --->

<!-- Klasör Modal -->
<div id="folderModal" class="modal flex">
  <div class="modal-content flex flex-col">
    <h3 class="text-white mb-2">Yeni Klasör Ekle</h3>
    <input type="text" id="folderNameInput" placeholder="Klasör adı..." />
    <div class="flex justify-end mt-2">
      <button onclick="createFolder()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500">Oluştur</button>
      <button onclick="closeFolderModal()" class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600">İptal</button>
    </div>
    <div id="folderList" class="mt-4 flex flex-col gap-2"></div>
  </div>
</div>

<script>
// --- Klasör Yönetimi ---
let folders = []; // LocalStorage'dan çekilebilir
const folderModal = document.getElementById('folderModal');
const folderIcon = document.getElementById('folderIcon');
const folderList = document.getElementById('folderList');

folderIcon.addEventListener('click', ()=>{ openFolderModal(); });

function openFolderModal() {
  folderModal.style.display='flex';
  renderFolders();
}

function closeFolderModal() { folderModal.style.display='none'; }

function createFolder() {
  const name = document.getElementById('folderNameInput').value.trim();
  if(!name) { alert('Klasör adı boş olamaz!'); return; }
  if(folders.includes(name)) { alert('Bu isimde klasör zaten var!'); return; }
  folders.push(name);
  renderFolders();
  document.getElementById('folderNameInput').value='';
}

function deleteFolder(name) {
  if(!confirm(`"${name}" klasörünü silmek istediğine emin misin?`)) return;
  folders = folders.filter(f=>f!==name);
  renderFolders();
}

function renderFolders() {
  folderList.innerHTML='';
  folders.forEach(f=>{
    const div = document.createElement('div');
    div.className='flex justify-between items-center p-2 bg-gray-800 rounded';
    div.innerHTML=`<span>${f}</span><button class="bg-red-600 text-white px-2 py-1 rounded text-sm" onclick="deleteFolder('${f}')">Sil</button>`;
    folderList.appendChild(div);
  });
}

// Modal dışına tıklayınca kapatma
window.onclick = function(event){
  if(event.target==folderModal) closeFolderModal();
}

</script>

<!-- --- Mevcut sitenin diğer tüm scriptleri aynen buraya --- -->

</body>
</html>
